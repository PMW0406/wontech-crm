<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>원텍 ROI 계산기</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <link rel="stylesheet" href="roi.css">
  <meta name="theme-color" content="#080c15">
  <style>.tabs--3{grid-template-columns:repeat(3,1fr)}</style>
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div class="brand-row" aria-label="Wontech Brand">
        <svg viewBox="0 0 310 205" xmlns="http://www.w3.org/2000/svg" fill="#ff4500" style="width:34px;height:22px"><rect x="0" y="0" width="95" height="95" rx="22"/><rect x="107" y="0" width="95" height="95" rx="22"/><rect x="215" y="0" width="95" height="95" rx="22"/><rect x="53" y="110" width="95" height="95" rx="22"/><rect x="161" y="110" width="95" height="95" rx="22"/></svg>
        <p class="hero-title">ROI Simulator</p>
      </div>
      <span class="hero-badge">Confidential</span>
    </header>

    <section class="tabs tabs--3" aria-label="ROI 계산기 종류 선택">
      <button class="tab is-active" data-tab="rf" type="button">RF/HIFU</button>
      <button class="tab" data-tab="laser" type="button">Laser</button>
      <button class="tab" data-tab="speech" type="button">Sales</button>
    </section>

    <section class="panel-wrap">
      <article class="panel is-active" id="panel-rf">
        <h2>RF/HIFU ROI 분석</h2>
        <p class="sub">장비와 패키지를 선택하면 검증된 기준값이 자동 입력됩니다. 예외 케이스는 "직접 입력"으로 조정하세요.</p>
        <form id="rf-form" class="form-grid" novalidate>
          <label>장비명
            <select name="equipmentName" id="rf-equipment" required></select>
          </label>
          <label id="rf-package-row">패키지명
            <select name="packageName" id="rf-package" required></select>
          </label>
          <label>패키지 가격(원)
            <input name="packagePrice" type="text" inputmode="numeric" value="11,000,000" required readonly data-price>
          </label>
          <label>제공 소모품수(개)
            <input name="consumableCount" type="number" min="0" step="1" value="10" required readonly>
          </label>
          <label>시술샷수(샷/회)
            <input name="shotsPerTreatment" type="number" min="1" step="1" value="300" required readonly>
          </label>
          <label>1회 시술단가(원)
            <input name="pricePerTreatment" type="text" inputmode="numeric" value="250,000" required data-price>
          </label>
          <label>일 시술 횟수(회/일)
            <input name="treatmentsPerDay" type="number" min="0" step="1" value="1" required>
          </label>
          <label>팁/카트리지 샷수(총 샷)
            <input name="tipShots" type="number" min="1" step="1" value="15000" required readonly>
          </label>
        </form>
        <div class="result-box" id="rf-result" aria-live="polite"></div>
      </article>

      <article class="panel" id="panel-laser">
        <h2>Laser ROI 분석</h2>
        <p class="sub">일 고객 유입을 반영한 패키지 매출 기준으로 투자 회수일을 계산합니다.</p>
        <form id="laser-form" class="form-grid" novalidate>
          <label>장비 가격(원)
            <input name="equipmentPrice" type="text" inputmode="numeric" value="150,000,000" required data-price>
          </label>
          <label>1회 시술단가(원)
            <input name="sessionUnitPrice" type="text" inputmode="numeric" value="300,000" required data-price>
          </label>
          <label>티케팅수(회)
            <input name="ticketingCount" type="number" min="0" step="1" value="3" required>
          </label>
          <label>고객수(명/일)
            <input name="customerCount" type="number" min="0" step="1" value="15" required>
          </label>
        </form>
        <div class="result-box" id="laser-result" aria-live="polite"></div>
      </article>

      <article class="panel" id="panel-speech">
        <div id="speech-grid-view">
          <div class="panel-header">
            <h2>Sales</h2>
            <p class="sub">장비를 선택하면 경쟁사 비교표와 세일즈 멘트를 확인할 수 있습니다.</p>
          </div>
          <div class="device-grid" id="device-grid"></div>
        </div>
        <div id="speech-detail-view" class="hidden">
          <button class="back-btn" id="back-btn" type="button">← 장비 목록</button>
          <div id="speech-detail-content"></div>
        </div>
      </article>
    </section>
  </main>

  <script>window.FIXED_LANG = "ko";</script>
  <script src="roi-lang.js?v=1"></script>
  <script src="roi-speech.js?v=3"></script>
  <script src="roi-app.js?v=16"></script>
  <script>
    // 3탭 연동 (납품조회 제외)
    (function() {
      const panels = {
        rf: document.getElementById("panel-rf"),
        laser: document.getElementById("panel-laser"),
        speech: document.getElementById("panel-speech")
      };
      document.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach(t => t.classList.remove("is-active"));
          tab.classList.add("is-active");
          Object.entries(panels).forEach(([key, panel]) => {
            if (panel) panel.classList.toggle("is-active", key === tab.dataset.tab);
          });
        });
      });
    })();
    try { initSpeech(); } catch(e) { console.error('initSpeech', e); }
  </script>
</body>
</html>
